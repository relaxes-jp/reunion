<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>同窓会名簿入力</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        input, select, textarea { width: 100%; margin-bottom: 15px; padding: 10px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #06C755; color: white; border: none; border-radius: 5px; cursor: pointer; }
        /* 必須項目のラベルに赤いアスタリスクを表示 */
        label.required::after {content: " *"; color: #ff4d4f; /* 赤色 */ font-weight: bold; margin-left: 4px;}
        /* ついでに見栄えを整える設定（任意） */
        label {display: block; margin-top: 15px; font-weight: bold; font-size: 0.9em; color: #333;}
    </style>
</head>
<body>
    <h3>リーガ同窓会名簿 入力・更新</h3>
    <form id="form">
        <label class="required">氏名</label>
        <input type="text" id="name" required>
        
        <label>旧姓</label>
        <input type="text" id="oldName">
        
        <label class="required">あの頃の所属</label>
        <select id="affiliation" required>
            <option value="">選択してください</option>
            <option value="社員">社員</option>
            <option value="直バイ">直バイ</option>
            <option value="派遣[HS]">派遣[HS]</option>
            <option value="派遣[AZ]">派遣[AZ]</option>
            <option value="派遣[NS]">派遣[NS]</option>
        </select>
        
        <label class="required">近況報告</label>
        <textarea id="message" rows="4" required></textarea>

        <label for="notify" class="required">グループ内への通知</label>
        <select id="notify" required>
            <option value="false">通知しない</option>
            <option value="true">通知する</option>
        </select>

        <button type="submit">名簿を保存・更新する</button>
    </form>

    <button type="button" id="downloadBtn" style="background: #555; margin-top: 10px;">名簿PDFをダウンロード</button>

    <script>
        // LIFF IDを入れてください
        const MY_LIFF_ID = '2009200501-caMtwvTZ';
        // GASのウェブアプリURLを入れてください
        const GAS_WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbwGgEqEC8lclUn6OBid-snBEPxkgwJr7vzgPOhuPzoHBdV7jj3bt1o80p8hR5sSxEd1uQ/exec';

        async function main() {
            await liff.init({ liffId: MY_LIFF_ID });
            if (!liff.isLoggedIn()) {
                liff.login();
            }

            // 1. プロフィール取得
            const profile = await liff.getProfile();

            // 2. 既存データの取得（GASへGETリクエスト）
            // userIdをパラメータとして送る
            try {
                const response = await fetch(GAS_WEB_APP_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'text/plain'
                    },
                    body: JSON.stringify({
                        reqType: 'getInitial',
                        userId: profile.userId
                    })
                });
                const result = await response.json();

                if (result.status === 'success' && result.data) {
                    // 3. 取得したデータをフォームにセット
                    document.getElementById('name').value = result.data.name || "";
                    document.getElementById('oldName').value = result.data.oldName || "";
                    document.getElementById('affiliation').value = result.data.affiliation || "";
                    document.getElementById('message').value = result.data.message || "";
                    
                    console.log("前回の内容を読み込みました");
                }
            } catch (e) {
                console.error("データ取得エラー:", e);
            }
        }
        main();

        document.getElementById('form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // プロフィール情報の取得
            const profile = await liff.getProfile(); 
            
            const formData = {
                reqType: 'saveData',
                userId: profile.userId,
                lineName: profile.displayName,
                name: document.getElementById('name').value,
                oldName: document.getElementById('oldName').value,
                affiliation: document.getElementById('affiliation').value,
                message: document.getElementById('message').value,
                notify: document.getElementById('notify').value
            };

            // GASへデータ送信
            const response = await fetch(GAS_WEB_APP_URL, {
                method: 'POST',
                headers: {
                    'Content-Type': 'text/plain' // GASのdoPostで受け取るための設定
                },
                body: JSON.stringify(formData)
            });

            if (response.ok) {
                alert('保存が完了しました！グループへ通知しました。');
                liff.closeWindow();
            } else {
                alert('エラーが発生しました。');
            }
        });

        document.getElementById('downloadBtn').addEventListener('click', async () => {
            const check = confirm('最新の名簿PDFを生成します。よろしいですか？');
            if (!check) return;

            // GASへPDF生成を依頼（fetchでtypeなどを指定して送る実装が必要）
            // 生成されたURLを window.open(url) で開く
            alert('生成機能は現在実装中です');
        });
    </script>
</body>
</html>
