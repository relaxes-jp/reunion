<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>名簿ダウンロード</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="common.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 40px 20px; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .btn-pdf { background: #E33E33; color: white; padding: 20px; border: none; border-radius: 8px; width: 100%; font-size: 1.1em; cursor: pointer; }
        .btn-pdf:disabled { background: #ccc; }
    </style>
</head>
<body>
    
    <h3 style="color: blue; font-weight: bold;">同窓会名簿 ダウンロード</h3>
    <div id="app-content" style="display: none;">
        <div class="card">
            <p>前日までの情報をベースにPDFを生成して外部ブラウザにて表示します。</p>
            <p>閲覧およびダウンロード時にGoogleアカウントの確認が行われます。</p>
            <p>ブラウザのメニューからダウンロードを選択してください。</p>
            <button id="downloadBtn" class="btn-pdf">PDFを作成・表示する</button>
            <div id="statusMsg" style="margin-top:20px; color:#666;"></div>
        </div>
    </div>

    <div id="wait-message" style="display: none;" class="error-overlay">
        <h3>認証中</h3>
        <p>ただいま認証中です。しばらくお待ちください。</p>
    </div>

    <div id="error-message" style="display: none;" class="error-overlay">
        <h3>アクセス権限がありません</h3>
        <p>この機能は同窓会公式LINEグループ内からのみ利用可能です。</p>
    </div>

    <script>
        const MY_LIFF_ID = '2009269538-s27MR4OG';

        async function main() {
            const auth = await initializeAndValidateAccess(MY_LIFF_ID);
            if (auth.status === 'unauthorized') {
                alert('グループ外からのアクセスは許可されていません。');
                liff.closeWindow();
                return;
            } else if (auth.status === 'unregistered') {
                alert('名簿のダウンロード機能は名簿登録者のみ利用可能です。');
                liff.closeWindow();
            }

            if (auth.status !== 'success') return;
        }

        document.getElementById('downloadBtn').addEventListener('click', async () => {
            const profile = await liff.getProfile();
            const btn = document.getElementById('downloadBtn');
            const msg = document.getElementById('statusMsg');
            const receivedKey = getAccessKey();

            btn.disabled = true;
            btn.innerText = "作成中...";
            msg.innerText = "15秒ほどかかる場合があります。";

            try {
                const result = await postToGas({ reqType: 'generatePDF', userId: profile.userId, accessToken: receivedKey});

                if (result.status === 'success') {
                    // 外部ブラウザでPDFを開く
                    liff.openWindow({
                        url: result.pdfUrl,
                        external: true
                    });
                    msg.innerText = "作成完了！外部ブラウザに遷移します。";
                    setTimeout(() => liff.closeWindow(), 3000);
                }
            } catch (e) {
                alert("エラーが発生しました。");
                btn.disabled = false;
                btn.innerText = "PDFを作成する";
            }
        });
        main();
    </script>
</body>
</html>
