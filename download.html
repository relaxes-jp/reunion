<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>名簿PDF出力</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="common.js"></script>
    <style>
        body { font-family: sans-serif; padding: 40px 20px; text-align: center; }
        .btn { padding: 20px; background: #555; color: white; border: none; border-radius: 5px; width: 100%; font-size: 1.1em; }
    </style>
</head>
<body>
    <h3>名簿PDFのダウンロード</h3>
    <p>最新のデータを集計してPDFを作成します。</p>
    <button class="btn" id="downloadBtn">PDFを生成してダウンロード</button>

    <script>
        const MY_LIFF_ID = '2009269538-s27MR4OG';

        document.getElementById('downloadBtn').addEventListener('click', async () => {
            const btn = document.getElementById('downloadBtn');
            btn.disabled = true;
            btn.innerText = "生成中...";

            try {
                const response = await postToGas({ reqType: 'generatePDF' });
                const result = await response.json();
                if (result.pdfUrl) {
                    window.open(result.pdfUrl, '_blank');
                    closeLiff("PDFの生成が完了しました！");
                }
            } catch (e) {
                alert("生成に失敗しました。");
                btn.disabled = false;
                btn.innerText = "PDFを生成してダウンロード";
            }
        });

        liff.init({ liffId: MY_LIFF_ID });
    </script>
</body>
</html>
