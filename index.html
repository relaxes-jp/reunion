<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>同窓会名簿入力</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="common.js"></script>
    <script src="https://unpkg.com/vconsole@latest/dist/vconsole.min.js"></script>
    <script>
    var vConsole = new window.VConsole(); // これだけでスマホ画面右下に「vConsole」ボタンが出ます
    </script>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        input, select, textarea { width: 100%; margin-bottom: 15px; padding: 10px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #06C755; color: white; border: none; border-radius: 5px; cursor: pointer; }
        label.required::after {content: " *"; color: #ff4d4f; font-weight: bold; margin-left: 4px;}
        label {display: block; margin-top: 15px; font-weight: bold; font-size: 0.9em; color: #333;}
    </style>
</head>
<body>
    <div id="app-content" style="display: none;">
        <h3 style="color: blue; font-weight: bold;">リーガ同窓会名簿 入力・更新</h3>
        <p style="color: red; font-weight: bold;">※更新の場合は情報取得されるまでしばらくお待ちください。</p>
        <p style="color: red; font-weight: bold;">※更新時にLINEのログイン処理が行われた場合はもう一度起動しなおしてください。</p>
        <form id="form">
            <label class="required">氏名</label>
            <input type="text" id="name" required>
            <label>旧姓</label>
            <input type="text" id="oldName">
            <label class="required">あの頃の所属</label>
            <select id="affiliation" required>
                <option value="">選択してください</option>
                <option value="社員">社員</option>
                <option value="直バイ">直バイ</option>
                <option value="派遣[HS]">派遣[HS]</option>
                <option value="派遣[AZ]">派遣[AZ]</option>
                <option value="派遣[NS]">派遣[NS]</option>
            </select>
            <label class="required">近況報告</label>
            <textarea id="message" rows="4" required></textarea>
            <label class="required">グループ内への通知</label>
            <div style="display: flex; gap: 20px; margin-bottom: 15px; padding: 10px; border: 1px solid #ddd; border-radius: 4px;">
                <label style="margin: 0; font-weight: normal; cursor: pointer;">
                    <input type="radio" name="notify" value="false" checked style="width: auto; margin-bottom: 0;"> 通知しない
                </label>
                <label style="margin: 0; font-weight: normal; cursor: pointer;">
                    <input type="radio" name="notify" value="true" style="width: auto; margin-bottom: 0;"> 通知する
                </label>
            </div>
            <button type="submit">名簿を保存・更新する</button>
        </form>
    </div>

    <div id="error-message" style="display: none;" class="error-overlay">
        <h3>アクセス権限がありません</h3>
        <p>この機能は同窓会公式LINEグループ内からのみ利用可能です。</p>
    </div>

    <script>
        const MY_LIFF_ID = '2009200501-caMtwvTZ';

        async function main() {
            await liff.init({ liffId: MY_LIFF_ID });
            if (!liff.isLoggedIn()) { liff.login(); return; }

            const profile = await liff.getProfile();
            let allowedGroupId = "";

            // GAS側に保持されている許可されたグループIDを取得
            try {
                const response = await postToGas({ reqType: 'getConfig', userId: profile.userId});
                console.log("response:", response);
                allowedGroupId = response.allowedGroupId;
                console.log("allowedGroupId:", allowedGroupId);
            } catch (e) { console.error("データ取得エラー:", e); }

            // グループIDチェック処理
            const context = liff.getContext();
            console.log("context:",context);
            // グループ内からのアクセスか、かつIDが一致するか確認
            if (!context || context.groupId !== allowedGroupId) {
                console.log("app-content: set none error-message block");
                document.getElementById('app-content').style.display = 'none';
                document.getElementById('error-message').style.display = 'block';
                return; // 処理を中断
            }

            // アプリコンテンツを表示する
            console.log("app-content: set block");
            document.getElementById('app-content').style.display = 'block';

            try {
                const response = await postToGas({ reqType: 'getInitial', userId: profile.userId, groupId: context.groupId });
                const result = await response.json();
                if (result.status === 'success' && result.data) {
                    document.getElementById('name').value = result.data.name || "";
                    document.getElementById('oldName').value = result.data.oldName || "";
                    document.getElementById('affiliation').value = result.data.affiliation || "";
                    document.getElementById('message').value = result.data.message || "";

                    // ラジオボタンの初期値をセット
                    const notifyValue = result.data.notify === 'true' || result.data.notify === true ? 'true' : 'false';
                    document.querySelector(`input[name="notify"][value="${notifyValue}"]`).checked = true;
                }
            } catch (e) { console.error("データ取得エラー:", e); }
        }
        main();

        document.getElementById('form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const profile = await liff.getProfile(); 
            const context = liff.getContext();

            const formData = {
                reqType: 'saveData',
                userId: profile.userId,
                groupId: context ? context.groupId : null,
                lineName: profile.displayName,
                name: document.getElementById('name').value,
                oldName: document.getElementById('oldName').value,
                affiliation: document.getElementById('affiliation').value,
                message: document.getElementById('message').value,
                notify: document.querySelector('input[name="notify"]:checked').value
            };

            try {
                const response = await postToGas(formData);
                const resData = await response.json();
                if (resData.status === 'success') {
                    const msg = document.getElementById('notify').value === 'true' 
                        ? '保存完了！グループへ通知しました。' 
                        : '保存完了！(通知なし)';
                    closeLiff(msg);
                } else if (resData.status === 'unauthorized') {
                    alert('グループ外からのアクセスは許可されていません。');
                }
            } catch (err) { alert('保存に失敗しました。'); }
        });
    </script>
</body>
</html>
